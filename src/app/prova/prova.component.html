<div class="d-flex flex-row align-items-start gap-5 p-3">
  <div id="example-string-interpolation">
    <h2>String interpolation</h2>

    <!-- esempio di componente Angular con ciclo di vita completo e dati da visualizzare nel template tramite string interpolation -->
    <mat-card class="example-card">
      <mat-card-header>
        <mat-card-title>Shiba Inu</mat-card-title>
        <mat-card-subtitle>Dog Breed</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ dogs[0].name.toUpperCase() }}</p>
        <p>{{ dogs[0].description }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button>LIKE</button>
        <button mat-button>SHARE</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <div id="examples-property-binding" class="d-flex flex-column">
    <h2>Property Binding</h2>

    <!-- esempio di utilizzo di una direttiva Angular per abilitare/disabilitare un pulsante in base a una proprietà del componente tramite property binding -->
    <button mat-raised-button color="primary" [disabled]="isButtonDisabled">
      Click me!
    </button>

    <!-- esempio di utilizzo di property binding per visualizzare immagini nel template -->
    <mat-card class="example-card mt-5">
      <mat-card-header>
        <div mat-card-avatar class="example-header-image"></div>
        <mat-card-title>Example title</mat-card-title>
        <mat-card-subtitle>Example subtitle</mat-card-subtitle>
      </mat-card-header>
      <img mat-card-image [src]="image" alt="Example" />
      <mat-card-content>
        <p>Example content</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button>LIKE</button>
        <button mat-button>SHARE</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <div id="example-event-binding">
    <h2>Event Binding</h2>

    <!-- esempio di utilizzo di un evento di click su un pulsante per triggerare un metodo del componente -->
    <button mat-flat-button color="primary" (click)="onClick()">
      Click me!
    </button>
  </div>

  <div id="example-event-binding-input">
    <h2>Event Binding - Input</h2>

    <!-- esempio di utilizzo di un evento di input su un campo di testo per triggerare un metodo del componente -->
    <mat-form-field class="example-full-width">
      <mat-label>Favorite food</mat-label>
      <input matInput placeholder="Ex. Pizza" (input)="onInput($event)" />
    </mat-form-field>
  </div>

  <div id="example-two-way-binding">
    <h2>Two-way binding</h2>

    <!-- esempio di utilizzo del two-way binding per sincronizzare il valore di un campo di testo con una proprietà del componente -->
    <mat-form-field class="example-full-width">
      <mat-label>Favorite food</mat-label>
      <input matInput placeholder="Ex. Pizza" (input)="onInput2wb($event)" />
    </mat-form-field>
    <p>{{ value }}</p>
  </div>
</div>
